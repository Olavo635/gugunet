<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gugunet JSON UI Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="toolbar">
    <div class="toolbar-left">
      <h1>JSON UI Editor</h1>
      <button id="btn-new" title="Novo Projeto">Novo</button>
      <button id="btn-import-project" title="Importar Projeto (.jsonui)">Abrir</button>
      <button id="btn-save-project" title="Salvar Projeto">Salvar</button>
      <span class="separator"></span>
      <button id="btn-import-mc" title="Importar JSON do Minecraft">Importar JSON</button>
      <button id="btn-export" title="Exportar JSON para Minecraft">Exportar</button>
      <button id="btn-export-gugunet" title="Exportar .gugunet-ui para implementar no servidor" style="background: var(--success); color: #000;">Exportar .gugunet-ui</button>
      <span class="separator"></span>
      <button id="btn-validate" title="Validar regras">Validar</button>
      <span class="separator"></span>
      <button id="btn-undo" title="Desfazer (Ctrl+Z)" disabled>↩</button>
      <button id="btn-redo" title="Refazer (Ctrl+Y)" disabled>↪</button>
    </div>
    <div class="toolbar-right">
      <label>Zoom:</label>
      <button id="btn-zoom-out">-</button>
      <span id="zoom-level">100%</span>
      <button id="btn-zoom-in">+</button>
    </div>
  </header>

  <main id="workspace">
    <aside id="components-panel">
      <h2>Componentes</h2>
      <div id="component-list">
        <div class="component-item" draggable="true" data-type="button">
          <div class="component-icon button-icon"></div>
          <span>Button</span>
        </div>
        <div class="component-item" draggable="true" data-type="label">
          <div class="component-icon label-icon"></div>
          <span>Label</span>
        </div>
        <div class="component-item" draggable="true" data-type="image">
          <div class="component-icon image-icon"></div>
          <span>Image</span>
        </div>
        <div class="component-item" draggable="true" data-type="panel">
          <div class="component-icon panel-icon"></div>
          <span>Panel</span>
        </div>
        <div class="component-item" draggable="true" data-type="stack_panel">
          <div class="component-icon stack-icon"></div>
          <span>Stack Panel</span>
        </div>
      </div>

      <h2>Árvore</h2>
      <div id="element-tree"></div>
    </aside>

    <section id="canvas-area">
      <div id="tool-bar">
        <button id="tool-select" class="tool-btn active" title="Selecionar (Q)">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 1l10 6-4 1 3 6-2 1-3-6-4 4z" fill="currentColor"/></svg>
        </button>
        <button id="tool-move" class="tool-btn" title="Mover (G)">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v14M1 8h14M8 1l-2 2m2-2l2 2M8 15l-2-2m2 2l2-2M1 8l2-2m-2 2l2 2M15 8l-2-2m2 2l-2 2" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
        </button>
        <button id="tool-scale" class="tool-btn" title="Escalar (S)">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" fill="currentColor"/><rect x="9" y="9" width="6" height="6" fill="currentColor"/><path d="M7 7l2 2M9 9l2 2" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <span class="tool-separator"></span>
        <button id="tool-snap" class="tool-btn active" title="Snap to Grid">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="1" width="4" height="4" fill="currentColor"/><rect x="6" y="6" width="4" height="4" fill="currentColor"/><rect x="11" y="11" width="4" height="4" fill="currentColor"/></svg>
        </button>
      </div>
      <div id="canvas-wrapper">
        <canvas id="preview-canvas"></canvas>
      </div>
      <div id="canvas-info">
        <span id="canvas-size">272 x 240</span>
      </div>
    </section>

    <aside id="properties-panel">
      <h2>Propriedades</h2>
      <div id="properties-content">
        <p class="empty-state">Selecione um elemento</p>
      </div>
    </aside>
  </main>

  <footer id="status-bar">
    <div id="validation-output"></div>
  </footer>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer"></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/undo.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/dragdrop.js"></script>
  <script src="js/binding-editor.js"></script>
  <script src="js/properties.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/importer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
